    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // ─── TOAST ITEM & TOAST CONTAINER ───
        function Toast({ toasts, onClose }) {
            if (!toasts || toasts.length === 0) return null;
            return (
                <div className="fixed bottom-8 right-8 z-[100] flex flex-col gap-3 pointer-events-none">
                    {toasts.map((toast) => (
                        <ToastItem key={toast.id} toast={toast} onClose={onClose} />
                    ))}
                </div>
            );
        }

        function ToastItem({ toast, onClose }) {
            const { id, message, type } = toast;

            useEffect(() => {
                const timer = setTimeout(() => {
                    onClose(id);
                }, 4000);
                return () => clearTimeout(timer);
            }, [id, onClose]);

            let bgClass = 'bg-surface-container-high border-primary text-primary';
            let iconName = 'check_circle';

            if (type === 'error') {
                bgClass = 'bg-error-container border-error text-on-error-container';
                iconName = 'error';
            } else if (type === 'warning') {
                bgClass = 'bg-yellow-950/80 border-yellow-500 text-yellow-200';
                iconName = 'warning';
            }

            return (
                <div
                    onClick={() => onClose(id)}
                    className={`pointer-events-auto cursor-pointer ${bgClass} px-6 py-4 rounded-xl shadow-2xl border backdrop-blur-xl flex items-center gap-3 animate-fade-in-up max-w-md transition-all duration-300`}
                >
                    <span className="material-symbols-outlined">{iconName}</span>
                    <span className="text-sm font-bold">{message}</span>
                </div>
            );
        }

        // ─── VIEW 2: UPLOAD PORTAL ───
        function Upload({ uploadedFiles, onUploadFile, isUploading }) {
            const [dragActive, setDragActive] = useState(false);
            const [activeFilter, setActiveFilter] = useState('all');
            const fileInputRef = useRef(null);

            const getStepStatus = (stepIndex) => {
                if (!isUploading) {
                    if (uploadedFiles.length > 0 && uploadedFiles[0].status === 'complete') {
                        return 'complete';
                    }
                    return 'idle';
                }
                
                const activeFile = uploadedFiles[0];
                if (!activeFile) return 'idle';

                const progress = activeFile.progress;
                if (stepIndex === 1) {
                    return progress >= 30 ? 'complete' : 'active';
                }
                if (stepIndex === 2) {
                    if (progress < 30) return 'idle';
                    return progress >= 60 ? 'complete' : 'active';
                }
                if (stepIndex === 3) {
                    if (progress < 60) return 'idle';
                    return progress >= 90 ? 'complete' : 'active';
                }
                if (stepIndex === 4) {
                    if (progress < 90) return 'idle';
                    return progress >= 100 ? 'complete' : 'active';
                }
                return 'idle';
            };

            const handleDrag = (e) => {
                e.preventDefault();
                e.stopPropagation();
                if (e.type === "dragenter" || e.type === "dragover") {
                    setDragActive(true);
                } else if (e.type === "dragleave") {
                    setDragActive(false);
                }
            };

            const handleDrop = (e) => {
                e.preventDefault();
                e.stopPropagation();
                setDragActive(false);
                if (e.dataTransfer.files && e.dataTransfer.files[0]) {
                    onUploadFile(e.dataTransfer.files[0]);
                }
            };

            const handleFileChange = (e) => {
                if (e.target.files && e.target.files[0]) {
                    onUploadFile(e.target.files[0]);
                }
            };

            const filterPills = [
                { id: 'all', label: 'All' },
                { id: 'gdpr', label: 'GDPR' },
                { id: 'hipaa', label: 'HIPAA' },
                { id: 'soc2', label: 'SOC2' },
                { id: 'iso27001', label: 'ISO27001' }
            ];

            const filteredHistory = uploadedFiles.filter(file => {
                if (activeFilter === 'all') return true;
                const frameworks = ['gdpr', 'hipaa', 'soc2', 'iso27001'];
                const mockFramework = frameworks[file.name.length % frameworks.length];
                return mockFramework === activeFilter;
            });

            return (
                <div className="p-8 space-y-6 animate-fade-in-up">
                    <div className="flex flex-wrap gap-3">
                        {filterPills.map(pill => {
                            const isActive = activeFilter === pill.id;
                            return (
                                <button
                                    key={pill.id}
                                    onClick={() => setActiveFilter(pill.id)}
                                    className={`px-4 py-1.5 rounded-full text-xs font-bold font-label-caps transition-all ${
                                        isActive
                                            ? 'bg-primary text-on-primary'
                                            : 'glass-card text-on-surface-variant hover:bg-surface-container'
                                    }`}
                                >
                                    {pill.label}
                                </button>
                            );
                        })}
                    </div>

                    <div className="grid grid-cols-12 gap-6">
                        <div className="col-span-12 lg:col-span-8 flex flex-col gap-6">
                            <div
                                onDragEnter={handleDrag}
                                onDragOver={handleDrag}
                                onDragLeave={handleDrag}
                                onDrop={handleDrop}
                                onClick={() => fileInputRef.current.click()}
                                className={`glass-card rounded-xl p-10 flex flex-col items-center justify-center border-dashed border-2 min-h-[320px] transition-all cursor-pointer group ${
                                    dragActive
                                        ? 'border-primary bg-primary/10 drop-zone-active'
                                        : 'border-primary/40 bg-primary/5 hover:bg-primary/10'
                                }`}
                            >
                                <div className="w-20 h-20 rounded-full bg-primary/20 flex items-center justify-center mb-6 group-hover:scale-110 transition-transform">
                                    <span className="material-symbols-outlined text-4xl text-primary animate-bounce-subtle" style={{ fontVariationSettings: "'FILL' 1" }}>
                                        cloud_upload
                                    </span>
                                </div>
                                <h2 className="font-headline-md text-headline-md text-primary mb-2">Ingest New Intelligence</h2>
                                <p className="text-on-surface-variant text-body-md mb-8 max-w-md text-center">
                                    Drag and drop policy documents, audit logs, or compliance frameworks. Supported formats: PDF, DOCX, CSV.
                                </p>
                                <button className="px-8 py-3 bg-primary text-on-primary font-bold rounded-lg flex items-center gap-2 hover:shadow-[0_0_15px_rgba(168,232,255,0.4)] transition-all pointer-events-none">
                                    <span className="material-symbols-outlined">add</span>
                                    Browse Files
                                </button>
                                <input
                                    type="file"
                                    ref={fileInputRef}
                                    onChange={handleFileChange}
                                    className="hidden"
                                    accept=".pdf,.docx,.csv,.txt"
                                />
                            </div>

                            <div className="glass-card rounded-xl p-6">
                                <div className="flex justify-between items-center mb-6">
                                    <h3 className="font-headline-md text-lg text-primary flex items-center gap-2">
                                        <span className="material-symbols-outlined">pending_actions</span>
                                        Active Upload Queue
                                    </h3>
                                    <span className="text-on-surface-variant text-xs font-label-caps uppercase">
                                        {uploadedFiles.filter(f => f.status !== 'complete').length} Task(s) Active
                                    </span>
                                </div>
                                <div className="space-y-6">
                                    {uploadedFiles.length === 0 ? (
                                        <p className="text-on-surface-variant text-sm text-center py-4 opacity-60">
                                            No files in queue. Upload a document to get started.
                                        </p>
                                    ) : (
                                        uploadedFiles.map((f, i) => {
                                            const isDone = f.status === 'complete';
                                            const isErr = f.status === 'error';
                                            const statusColor = isDone ? 'primary' : isErr ? 'error' : 'secondary';
                                            const statusLabel = isDone ? 'READY' : isErr ? 'FAILED' : 'EXTRACTING';
                                            const barWidth = Math.min(f.progress || 0, 100);
                                            const icon = f.name.endsWith('.pdf') ? 'picture_as_pdf' : 'description';
                                            const glow = isDone ? 'shadow-[0_0_8px_rgba(168,232,255,0.5)]' : !isErr ? 'shadow-[0_0_8px_rgba(76,215,246,0.5)]' : '';

                                            return (
                                                <div key={i} className="space-y-2 animate-fade-in-up">
                                                    <div className="flex justify-between items-end">
                                                        <div className="flex items-center gap-3">
                                                            <span className={`material-symbols-outlined text-${statusColor}`}>{icon}</span>

                                                                <p className="text-sm font-bold">{f.name}</p>
                                                                <p className="text-[10px] text-on-surface-variant uppercase tracking-tighter">
                                                                    {f.size} • {isDone ? 'Processing Complete' : isErr ? 'Upload Failed' : 'Extraction in Progress'}

                                                            </div>
                                                        </div>
                                                        <div className="flex items-center gap-2">
                                                            <span className={`status-pill bg-${statusColor}/10 text-${statusColor} border border-${statusColor}/20`}>
                                                                {statusLabel}
                                                            </span>
                                                            <span className={`font-data-md text-${statusColor}`}>{Math.round(barWidth)}%</span>

                                                            className={`h-full bg-${statusColor} ${glow} transition-all duration-300`}
                                                            style={{ width: `${barWidth}%` }}
                                                        ></div>
                                                    </div>
                                                </div>
                                            );
                                        })
                                    )}
                                </div>
                            </div>
                        </div>

                        <div className="col-span-12 lg:col-span-4">
                            <div className="glass-card rounded-xl p-6 h-full border-primary/20">
                                <h3 className="font-headline-md text-lg text-primary mb-8 flex items-center gap-2">
                                    <span className="material-symbols-outlined">auto_fix_high</span>
                                    VaultIQ Agent Pipeline
                                </h3>

                                    <div className="absolute left-[11px] top-2 h-[calc(100%-16px)] pipeline-line"></div>

                                    <PipelineStep step={2} title="Semantic Analysis" desc="Neural mapping of compliance clauses." status={getStepStatus(2)} />

                                <div className="glass-card p-6 rounded-xl relative overflow-hidden group">
                                    <div className="flex justify-between items-start">
                                        <div>

                                    <div className="mt-4 flex items-center gap-2 text-secondary">
                                        <span className="material-symbols-outlined text-[16px]">schedule</span>

                                    </div>
                                    <div className="absolute bottom-0 left-0 h-1 bg-secondary w-1/2"></div>

                                <div className="glass-card p-6 rounded-xl relative overflow-hidden group">
                                    <div className="flex justify-between items-start">
                                        <div>
                                            <p className="font-label-caps text-label-caps text-on-surface-variant mb-1">RESOLVED THIS MONTH</p>

                            </div>

                            <div className="grid grid-cols-1 lg:grid-cols-12 gap-6">
                                <div className="lg:col-span-8 glass-card p-6 rounded-xl">
                                    <div className="flex justify-between items-center mb-6">

                                        <div className="flex gap-4">
                                            <div className="flex items-center gap-2"><span className="w-3 h-3 rounded-full bg-error"></span><span className="text-[10px] font-label-caps">Crit</span></div>
                                            <div className="flex items-center gap-2"><span className="w-3 h-3 rounded-full bg-orange-500"></span><span className="text-[10px] font-label-caps">High</span></div>

                                                <div className="absolute inset-0 grid grid-rows-4">
                                                    <div className="border-t border-outline-variant/20"></div>
                                                    <div className="border-t border-outline-variant/20"></div>

                                                <svg className="absolute inset-0 h-full w-full" preserveAspectRatio="none">
                                                    <path
                                                        className="drop-shadow-[0_0_5px_#ffb4ab]"

                                <div className="lg:col-span-4 glass-card p-6 rounded-xl flex flex-col justify-between">
                                    <div>
                                        <h4 className="font-headline-md text-headline-md text-on-surface mb-2">Security Posture</h4>
                                        <p className="text-body-sm text-on-surface-variant">Real-time aggregate risk coefficient across all enterprise nodes.</p>
                                    </div>
                                    <div className="relative py-8 flex items-center justify-center">
                                        <div className="risk-gauge-container">
                                            <div className="risk-gauge"></div>
                                            <div
                                                className="risk-gauge-active"
                                                style={{ transform: `rotate(${-90 + (score / 100) * 180}deg)`, transition: 'transform 1s ease' }}
                                            ></div>
                                        </div>
                                        <div className="absolute bottom-6 text-center">
                                            <span className="font-display-lg text-display-lg text-primary">{score}</span>
                                            <p className="font-label-caps text-[10px] text-on-surface-variant">OPTIMAL RANGE</p>
                                        </div>
                                    </div>
                                    <div className="space-y-3">
                                        <div className="flex justify-between text-body-sm">
                                            <span>Data Integrity</span>
                                            <span className="text-primary font-data-md">{Math.min(score + 10, 100)}%</span>
                                        </div>
                                        <div className="w-full h-1 bg-surface-container rounded-full overflow-hidden">
                                            <div className="h-full bg-primary" style={{ width: `${Math.min(score + 10, 100)}%` }}></div>
                                        </div>
                                        <div className="flex justify-between text-body-sm">
                                            <span>Threat Neutralization</span>
                                            <span className="text-secondary font-data-md">{Math.max(score - 10, 0)}%</span>
                                        </div>
                                        <div className="w-full h-1 bg-surface-container rounded-full overflow-hidden">
                                            <div className="h-full bg-secondary" style={{ width: `${Math.max(score - 10, 0)}%` }}></div>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <div className="glass-card rounded-xl overflow-hidden">
                                <div className="p-6 border-b border-outline-variant flex justify-between items-center flex-wrap gap-4">
                                    <h4 className="font-headline-md text-headline-md text-on-surface">Risk Register</h4>
                                    <div className="flex gap-2">
                                        <input
                                            className="bg-surface-container border border-outline-variant rounded px-3 py-1.5 text-body-sm focus:border-primary focus:ring-1 focus:ring-primary outline-none text-on-surface"
                                            placeholder="Filter ID..."
                                            type="text"
                                        />
                                        <button type="button" className="flex items-center gap-2 border border-outline-variant px-4 py-1.5 rounded text-label-caps hover:bg-surface-container transition-colors text-xs font-bold font-label-caps">
                                            <span className="material-symbols-outlined text-[18px]">download</span>
                                            EXPORT CSV
                                        </button>
                                    </div>
                                </div>
                                <div className="overflow-x-auto">
                                    <table className="w-full text-left border-collapse">
                                        <thead className="bg-surface-container/50 font-label-caps text-on-surface-variant text-[11px] uppercase tracking-wider">
                                            <tr>
                                                <th className="px-6 py-4">Risk ID</th>
                                                <th className="px-6 py-4">Description</th>
                                                <th className="px-6 py-4">Framework</th>
                                                <th className="px-6 py-4">Severity</th>
                                                <th className="px-6 py-4">Status</th>
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y divide-outline-variant">
                                            {riskRegister.map((item, idx) => (
                                                <tr key={idx} className="hover:bg-primary/5 transition-colors group table-row-hover">
                                                    <td className="px-6 py-4 font-data-md text-primary">{item.id}</td>
                                                    <td className="px-6 py-4 text-body-sm max-w-sm truncate" title={item.desc}>{item.desc}</td>
                                                    <td className="px-6 py-4">
                                                        <span className="text-label-caps bg-surface-container-high px-2 py-0.5 rounded text-[10px] border border-outline-variant uppercase">
                                                            {item.framework}
                                                        </span>
                                                    </td>
                                                    <td className="px-6 py-4 flex items-center h-full">
                                                        <span className={`risk-dot ${item.color.split(' ')[0]}`}></span>
                                                        <span className={`font-bold text-xs ${item.color.split(' ')[1]}`}>{item.severity}</span>
                                                    </td>
                                                    <td className="px-6 py-4">
                                                        <span className={`px-3 py-1 rounded-full text-[10px] font-bold ${
                                                            item.status === 'ACTIVE' ? 'bg-error/10 text-error' : item.status === 'REVIEWING' ? 'bg-secondary/10 text-secondary' : 'bg-surface-container-highest text-on-surface-variant'
                                                        } status-pill`}>
                                                            {item.status}
                                                        </span>
                                                    </td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            </div>

                            <div className="glass-card rounded-xl overflow-hidden">
                                <button
                                    type="button"
                                    className="w-full flex items-center justify-between p-6 hover:bg-surface-container transition-colors text-left"
                                    onClick={() => setLogOpen(!logOpen)}
                                >
                                    <div className="flex items-center gap-4">
                                        <span className="material-symbols-outlined text-secondary">terminal</span>
                                        <h4 className="font-headline-md text-headline-md text-on-surface">Agent Communication Log (A2A)</h4>
                                    </div>
                                    <span className={`material-symbols-outlined transition-transform duration-300 ${logOpen ? 'rotate-180' : ''}`}>
                                        expand_more
                                    </span>
                                </button>
                                {logOpen && (
                                    <div className="bg-[#0D1321] p-6 font-data-md text-data-md space-y-2 border-t border-outline-variant max-h-60 overflow-y-auto custom-scrollbar">
                                        {hasReport ? (
                                            <>
                                                <div className="flex gap-4">
                                                    <span className="text-secondary-fixed-dim">[{timeStr}]</span>
                                                    <span className="text-primary">[INGESTION_A1]</span>
                                                    <span className="text-on-surface-variant">Document parsing complete.</span>
                                                </div>
                                                <div className="flex gap-4">
                                                    <span className="text-secondary-fixed-dim">[{timeStr}]</span>
                                                    <span className="text-error">[RISK_ENGINE_B7]</span>
                                                    <span className="text-error">ANALYSIS COMPLETE: Found {gapsCount} compliance gap(s). Risk score: {score}%</span>
                                                </div>
                                                <div className="flex gap-4">
                                                    <span className="text-secondary-fixed-dim">[{timeStr}]</span>
                                                    <span className="text-secondary">[REPORT_AGENT_C1]</span>
                                                    <span className="text-on-surface-variant">Synthesized executive report for review.</span>
                                                </div>
                                                {gaps.map((g, idx) => (
                                                    <div key={idx} className="flex gap-4">
                                                        <span className="text-secondary-fixed-dim">[{timeStr}]</span>
                                                        <span className="text-error">[A2A_ALERT]</span>
                                                        <span className="text-error">GAP: {g}</span>
                                                    </div>
                                                ))}
                                            </>
                                        ) : (
                                            <>
                                                <div className="flex gap-4">
                                                    <span className="text-secondary-fixed-dim">[14:22:01]</span>
                                                    <span className="text-primary">[INGESTION_A1]</span>
                                                    <span className="text-on-surface-variant">Streaming logs to Risk Analyzer... [DATA_PKT_083]</span>
                                                </div>
                                                <div className="flex gap-4">
                                                    <span className="text-secondary-fixed-dim">[14:22:05]</span>
                                                    <span className="text-error">[RISK_ENGINE_B7]</span>
                                                    <span className="text-error">CRITICAL_THREAT_FOUND: Entropy shift in block_auth. Key: "ADMIN_ROOT"</span>
                                                </div>
                                            </>
                                        )}
                                    </div>
                                )}
                            </div>
                        </>
                    )}
                </div>
            );
        }

        // ─── MAIN APP COORDINATOR ───
        function App() {
            const [currentPage, setCurrentPage] = useState('dashboard');
            const [toasts, setToasts] = useState([]);
            const [uploadedFiles, setUploadedFiles] = useState([]);
            const [dashboardData, setDashboardData] = useState(null);
            const [reportData, setReportData] = useState(null);
            const [isUploading, setIsUploading] = useState(false);
            const [isChatting, setIsChatting] = useState(false);
            const [isGenerating, setIsGenerating] = useState(false);

            const [mousePos, setMousePos] = useState({ x: -1000, y: -1000 });
            useEffect(() => {
                const handleMouseMove = (e) => {
                    setMousePos({ x: e.clientX, y: e.clientY });
                };
                window.addEventListener('mousemove', handleMouseMove);
                return () => window.removeEventListener('mousemove', handleMouseMove);
            }, []);

            const [chatMessages, setChatMessages] = useState([
                {
                    id: 'demo-1',
                    sender: 'user',
                    text: 'What are the data retention requirements under GDPR Article 5?'
                },
                {
                    id: 'demo-2',
                    sender: 'ai',
                    text: 'Under GDPR Article 5, personal data must be kept in a form which permits identification of data subjects for **no longer than is necessary** for the purposes for which the personal data are processed.\n\n- Data may be stored for longer periods for archiving purposes in the public interest, scientific/historical research, or statistical purposes.\n- Appropriate technical and organizational measures must be implemented.\n- Organizations must establish clear time limits for periodic review of data storage.'
                },
                {
                    id: 'demo-3',
                    sender: 'user',
                    text: 'Are we currently compliant with this requirement?'
                },
                {
                    id: 'demo-4',
                    sender: 'ai',
                    gapData: {
                        clause: 'Section 4.2 states: "All marketing lead data shall be retained indefinitely to ensure customer lifetime value tracking."',
                        explanation: 'This contradicts GDPR Storage Limitation principles which prohibit indefinite retention of identifiable lead data without active consent renewal or specific legal justification.',
                        level: 'High'
                    }
                }
            ]);

            useEffect(() => {
                const handleHashChange = () => {
                    const hash = window.location.hash.replace('#', '');
                    const validPages = ['dashboard', 'upload', 'chat', 'reports'];
                    if (validPages.includes(hash)) {
                        setCurrentPage(hash);
                    } else {
                        setCurrentPage('dashboard');
                    }
                };
                window.addEventListener('hashchange', handleHashChange);
                handleHashChange();
                return () => window.removeEventListener('hashchange', handleHashChange);
            }, []);

            const handleNavigate = (page) => {
                window.location.hash = page;
            };

            const fetchDashboard = async () => {
                try {
                    const res = await fetch('/dashboard');
                    if (res.ok) {
                        const data = await res.json();
                        setDashboardData(data);
                    }
                } catch (err) {
                    console.warn('Dashboard fetch error:', err.message);
                }
            };

            useEffect(() => {
                fetchDashboard();
                const interval = setInterval(fetchDashboard, 30000);
                return () => clearInterval(interval);
            }, []);

            const addToast = (message, type = 'success') => {
                const id = Date.now() + Math.random().toString(36).substr(2, 5);
                setToasts((prev) => [...prev, { id, message, type }]);
            };

            const removeToast = (id) => {
                setToasts((prev) => prev.filter((t) => t.id !== id));
            };

            const handleUploadFile = async (file) => {
                if (isUploading) return;
                setIsUploading(true);

                const fileEntry = {
                    name: file.name,
                    size: (file.size / (1024 * 1024)).toFixed(1) + ' MB',
                    status: 'uploading',
                    progress: 0,
                    timestamp: new Date()
                };

                setUploadedFiles((prev) => [fileEntry, ...prev]);

                const progressInterval = setInterval(() => {
                    setUploadedFiles((prev) =>
                        prev.map((f) => {
                            if (f.name === file.name && f.status === 'uploading' && f.progress < 90) {
                                return { ...f, progress: f.progress + Math.floor(Math.random() * 15 + 5) };
                            }
                            return f;
                        })
                    );
                }, 300);

                try {
                    const formData = new FormData();
                    formData.append('file', file);

                    const response = await fetch('/upload', {
                        method: 'POST',
                        body: formData
                    });

                    if (!response.ok) {
                        throw new Error(`Server returned ${response.status}: ${response.statusText}`);
                    }

                    const result = await response.json();

                    clearInterval(progressInterval);
                    setUploadedFiles((prev) =>
                        prev.map((f) =>
                            f.name === file.name
                                ? { ...f, status: 'complete', progress: 100 }
                                : f
                        )
                    );

                    addToast(`✓ ${file.name} uploaded and indexed successfully`);
                    await fetchDashboard();

                } catch (err) {
                    clearInterval(progressInterval);
                    setUploadedFiles((prev) =>
                        prev.map((f) =>
                            f.name === file.name
                                ? { ...f, status: 'error', progress: 0 }
                                : f
                        )
                    );
                    addToast(`✗ Upload failed: ${err.message}`, 'error');
                } finally {
                    setIsUploading(false);
                }
            };

            const handleSendMessage = async (text) => {
                if (!text.trim() || isChatting) return;

                const userMsg = {
                    id: 'user-' + Date.now(),
                    sender: 'user',
                    text
                };

                setChatMessages((prev) => [...prev, userMsg]);
                setIsChatting(true);

                try {
                    const response = await fetch(`/chat?q=${encodeURIComponent(text)}`, {
                        method: 'POST'
                    });

                    if (!response.ok) {
                        throw new Error(`Server returned ${response.status}: ${response.statusText}`);
                    }

                    const result = await response.json();
                    
                    const aiMsg = {
                        id: 'ai-' + Date.now(),
                        sender: 'ai',
                        text: result.answer
                    };

                    setChatMessages((prev) => [...prev, aiMsg]);

                } catch (err) {
                    const errMsg = {
                        id: 'error-' + Date.now(),
                        sender: 'ai',
                        isError: true,
                        text: 'Sorry, I could not process your request. Ensure a PDF is uploaded first and that the backend server is running.'
                    };
                    setChatMessages((prev) => [...prev, errMsg]);
                    addToast(`✗ Chat error: ${err.message}`, 'error');
                } finally {
                    setIsChatting(false);
                }
            };

            const handleGenerateReport = async () => {
                setIsGenerating(true);
                try {
                    const res = await fetch('/report');
                    if (!res.ok) {
                        throw new Error(`Server returned ${res.status}: ${res.statusText}`);
                    }
                    const data = await res.json();
                    if (data.message === 'No document uploaded') {
                        addToast('Please upload a document before generating reports.', 'warning');
                        setReportData(null);
                    } else {
                        setReportData(data);
                        addToast('✓ Compliance report generated successfully!');
                    }
                } catch (err) {
                    addToast(`✗ Report generation failed: ${err.message}`, 'error');
                    setReportData(null);
                } finally {
                    setIsGenerating(false);
                }
            };

            const pageTitles = {
                dashboard: 'Compliance Overview',
                upload: 'Document Upload Portal',
                chat: 'Compliance Assistant',
                reports: 'Risk Intelligence Portal'
            };

            return (
                <div className="flex min-h-screen">
                    <div
                        id="cursor-glow"
                        style={{ left: `${mousePos.x}px`, top: `${mousePos.y}px` }}
                    ></div>

                    <Sidebar currentPage={currentPage} onNavigate={handleNavigate} />

                    <div className="ml-[240px] flex flex-col flex-1 min-h-screen relative z-10">
                        <Header title={pageTitles[currentPage] || 'VaultIQ'} />
                        <main className="flex-1">
                            {currentPage === 'dashboard' && (
                                <Dashboard data={dashboardData} onNavigate={handleNavigate} />
                            )}
                            {currentPage === 'upload' && (
                                <Upload
                                    uploadedFiles={uploadedFiles}
                                    onUploadFile={handleUploadFile}
                                    isUploading={isUploading}
                                />
                            )}
                            {currentPage === 'chat' && (
                                <Chat
                                    chatMessages={chatMessages}
                                    onSendMessage={handleSendMessage}
                                    isChatting={isChatting}
                                    uploadedFiles={uploadedFiles}
                                />
                            )}
                            {currentPage === 'reports' && (
                                <Reports
                                    reportData={reportData}
                                    onGenerateReport={handleGenerateReport}
                                    isGenerating={isGenerating}
                                />
                            )}
                        </main>
                    </div>

                    <Toast toasts={toasts} onClose={removeToast} />
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
